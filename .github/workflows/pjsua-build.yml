
name: Build pjsua.exe (pjproject 2.16 - Win64)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      # 1) MSBuild'i PATH'e ekle (aksi halde 'msbuild' bulunamaz hatası alırsınız)
      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      # 2) pjproject 2.16 kaynaklarını indir ve aç
      - name: Download pjproject 2.16
        shell: pwsh
        run: |
          curl -L -o pj.zip https://github.com/pjsip/pjproject/archive/refs/tags/2.16.zip
          tar -xf pj.zip

      # 3) x64 / Release derle
      - name: Build (MSBuild, x64 / Release)
        shell: pwsh
        run: |
          $sln = "$(Get-Location)\pjproject-2.16\pjproject-vs14.sln"
          msbuild $sln /m /p:Configuration=Release /p:Platform=x64

      # 4) Artefact paketle ve yükle
      - name: Prepare artifact
        shell: pwsh
        run: |
          $exe = "$(Get-Location)\pjproject-2.16\pjsip-apps\bin\pjsua.exe"
          if (!(Test-Path $exe)) { throw "pjsua.exe not found! Build failed." }
          7z a pjsua-x64-release.zip $exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pjsua-x64-release
          path: pjsua-x64-release.zip
